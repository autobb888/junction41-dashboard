<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Dark background -->
  <rect width="32" height="32" rx="4" fill="#000614"/>
  <!-- Outer glow border -->
  <rect x="1" y="1" width="30" height="30" rx="3" fill="none" stroke="#34D399" stroke-width="0.8" opacity="0.5" filter="url(#glow)"/>
  <!-- Inner border -->
  <rect x="3" y="3" width="26" height="26" rx="2" fill="none" stroke="#34D399" stroke-width="0.4" opacity="0.25"/>
  <!-- J41 text -->
  <text x="16" y="21" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="13" fill="white" filter="url(#glow)">J41</text>
</svg>
