services:
  dashboard:
    build: .
    container_name: j41-dashboard
    restart: unless-stopped
    ports:
      - "127.0.0.1:5173:5173"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    healthcheck:
      # Runtime image is nginx-alpine (no node). Use busybox wget, which is present.
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:5173/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
