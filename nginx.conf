worker_processes 1;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
  worker_connections 256;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  tcp_nopush    on;
  keepalive_timeout 65;
  server_tokens off;

  client_body_temp_path /tmp/client_body;
  proxy_temp_path       /tmp/proxy;
  fastcgi_temp_path     /tmp/fastcgi;
  uwsgi_temp_path       /tmp/uwsgi;
  scgi_temp_path        /tmp/scgi;

  log_format combined_real_ip '$remote_addr - $remote_user [$time_local] '
                              '"$request" $status $body_bytes_sent '
                              '"$http_referer" "$http_user_agent"';
  access_log /dev/stdout combined_real_ip;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
  gzip_min_length 1024;

  # Content Security Policy. Cloudflare Transform Rules already deliver HSTS,
  # X-Frame-Options, X-Content-Type-Options, Referrer-Policy, and
  # Permissions-Policy on this domain — CSP was the gap, set here so the
  # browser actually enforces a script/connect/img allowlist.
  map $sent_http_content_type $csp_header {
    default "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://api.junction41.io wss://api.junction41.io https://login.junction41.io; font-src 'self' data:; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests";
  }

  server {
    listen 5173 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Apply CSP to every response. Other security headers come from Cloudflare
    # so we don't duplicate them here (header conflicts produce the strictest
    # value, but multiple X-Frame-Options can confuse legacy browsers).
    add_header Content-Security-Policy $csp_header always;

    # Reject config-leak / scanner probes with real 404s so WAF / fail2ban / CF
    # Bot Fight Mode get clean signal. The SPA fallback below would otherwise
    # serve index.html (HTTP 200) for every unknown path.
    location ~ /\.(?!well-known) { return 404; }
    location ~ \.(php|phtml|asp|aspx|jsp|cgi|bak|old|orig|swp|swo|sql|tar|tgz|gz|zip|rar|7z|env|ini|conf|log|pem|key|p12)$ { return 404; }
    location ~ ^/(wp-admin|wp-login|wp-content|wp-includes|xmlrpc|administrator|phpmyadmin|pma|adminer|.aws|.git|.svn|.docker|.npmrc|.netrc|.htpasswd|.pgpass|.pypirc|.composer|.boto)(/|$) { return 404; }

    # Static assets served from /assets get long-cache; everything else is SPA.
    location /assets/ {
      try_files $uri =404;
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
